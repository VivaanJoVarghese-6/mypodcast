<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPodcast - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e27; --bg-secondary: #1a1f3a;
            --accent-primary: #00d4ff; --accent-secondary: #ff006e;
            --text-primary: #ffffff; --text-secondary: #b0b8cc;
            --glass-light: rgba(255,255,255,0.08); --glass-medium: rgba(255,255,255,0.12);
            --glass-dark: rgba(255,255,255,0.05); --success: #00d084; --error: #ff006e;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
            background-attachment: fixed; color: var(--text-primary);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(255,0,110,0.06) 0%, transparent 60%),
                        radial-gradient(circle at 30% 70%, rgba(0,212,255,0.06) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        nav { position: relative; z-index: 10; background: var(--glass-dark); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-medium); padding: 1.2rem 2rem; }
        .nav-menu { display: flex; justify-content: center; gap: 4rem; list-style: none; max-width: 1200px; margin: 0 auto; }
        .nav-menu a { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--accent-secondary); }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; position: relative; z-index: 1; }
        .auth-card { background: var(--glass-light); backdrop-filter: blur(20px); border: 1px solid var(--glass-medium); border-radius: 24px; padding: 3rem; width: 100%; max-width: 440px; animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .auth-logo { text-align: center; margin-bottom: 2rem; }
        .auth-logo h1 { font-family: 'Syne', sans-serif; font-size: 2rem; letter-spacing: -1px; background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .auth-logo p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.3rem; }
        h2 { font-family: 'Syne', sans-serif; font-size: 1.8rem; margin-bottom: 1.8rem; text-align: center; color: var(--text-primary); }
        .form-group { margin-bottom: 1.3rem; }
        label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 0.9rem; }
        input { width: 100%; padding: 0.9rem 1rem 0.9rem 2.8rem; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-medium); border-radius: 12px; color: var(--text-primary); font-family: 'Outfit', sans-serif; font-size: 1rem; transition: all 0.3s ease; outline: none; }
        input:focus { border-color: var(--accent-secondary); background: rgba(255,0,110,0.05); box-shadow: 0 0 0 3px rgba(255,0,110,0.1); }
        input::placeholder { color: rgba(255,255,255,0.25); }
        #otp { font-size: 1.6rem; letter-spacing: 10px; text-align: center; padding-left: 1rem; font-weight: 700; }
        .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--accent-secondary), #cc0055); border: none; border-radius: 12px; color: white; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; margin-top: 0.5rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,0,110,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message { text-align: center; padding: 0.8rem; border-radius: 10px; font-size: 0.9rem; margin-top: 1rem; display: none; }
        .message.success { background: rgba(0,208,132,0.15); border: 1px solid rgba(0,208,132,0.3); color: var(--success); display: block; }
        .message.error { background: rgba(255,0,110,0.15); border: 1px solid rgba(255,0,110,0.3); color: var(--error); display: block; }
        .otp-hint { text-align: center; color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 1.5rem; line-height: 1.6; }
        .otp-hint span { color: var(--accent-secondary); font-weight: 600; }
        .resend-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary); }
        .resend-link a { color: var(--accent-primary); text-decoration: none; font-weight: 600; cursor: pointer; }
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        .auth-footer a { color: var(--accent-primary); text-decoration: none; font-weight: 600; }
        .steps { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-bottom: 2rem; }
        .step { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .step-dot { width: 26px; height: 26px; border-radius: 50%; background: var(--glass-medium); border: 1px solid var(--glass-medium); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; transition: all 0.3s; }
        .step.active .step-dot { background: var(--accent-secondary); border-color: var(--accent-secondary); color: #fff; }
        .step.done .step-dot { background: var(--success); border-color: var(--success); color: #000; }
        .step-line { width: 30px; height: 1px; background: var(--glass-medium); }
        footer { background: var(--glass-dark); border-top: 1px solid var(--glass-medium); padding: 1.5rem; text-align: center; color: rgba(255,255,255,0.3); font-size: 0.85rem; position: relative; z-index: 1; }
    </style>
</head>
<body>
    <nav>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html" class="active">Register</a></li>
        </ul>
    </nav>
    <main>
        <div class="auth-card">
            <div class="auth-logo">
                <h1>MYPODCAST</h1>
                <p>Create your account 🎙️</p>
            </div>

            <div class="steps">
                <div class="step active" id="stepDot1"><div class="step-dot">1</div><span>Details</span></div>
                <div class="step-line"></div>
                <div class="step" id="stepDot2"><div class="step-dot">2</div><span>Verify</span></div>
                <div class="step-line"></div>
                <div class="step" id="stepDot3"><div class="step-dot">3</div><span>Done</span></div>
            </div>

            <!-- STEP 1: Register Form -->
            <div id="step1">
                <h2>Register</h2>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Your name">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="your@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Min 6 characters">
                    </div>
                </div>
                <button class="btn" onclick="register()" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </div>

            <!-- STEP 2: OTP Verification -->
            <div id="step2" style="display:none">
                <h2>Verify Email</h2>
                <p class="otp-hint">📧 A 6-digit verification code was sent to<br><span id="emailDisplay"></span></p>
                <div class="form-group">
                    <label>OTP Code</label>
                    <div class="input-wrapper">
                        <input type="text" id="otp" placeholder="000000" maxlength="6" inputmode="numeric">
                    </div>
                </div>
                <button class="btn" onclick="verifyOTP()" id="verifyBtn">
                    <i class="fas fa-check-circle"></i> Verify Email
                </button>
                <div class="resend-link">Didn't receive it? <a onclick="resendOTP()">Resend OTP</a></div>
            </div>

            <div class="message" id="message"></div>
            <div class="auth-footer">Already have an account? <a href="login.html">Login here</a></div>
        </div>
    </main>
    <footer><p>&copy; 2026 MyPodcast. All rights reserved.</p></footer>

    <script>
        let userEmail = '';

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        async function register() {
            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !email || !password) return showMessage('Please fill in all fields.', 'error');
            if (password.length < 6) return showMessage('Password must be at least 6 characters.', 'error');

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            try {
                const res = await fetch('https://mypodcast-1.onrender.com/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (data.requireOTP) {
                    userEmail = email;
                    document.getElementById('emailDisplay').textContent = email;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('stepDot1').classList.replace('active', 'done');
                    document.getElementById('stepDot2').classList.add('active');
                    showMessage('✅ ' + data.message, 'success');
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch {
                showMessage('❌ Cannot connect to server. Is it running?', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value.trim();
            if (!otp || otp.length !== 6) return showMessage('Please enter the 6-digit OTP.', 'error');

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                 const res = await fetch('https://mypodcast-1.onrender.com/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp })
                });
                const data = await res.json();

                if (data.message.includes('verified') || data.message.includes('success')) {
                    document.getElementById('stepDot2').classList.replace('active', 'done');
                    document.getElementById('stepDot3').classList.add('active');
                    showMessage('✅ ' + data.message, 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch {
                showMessage('❌ Cannot connect to server.', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify Email';
        }

        async function resendOTP() {
            showMessage('⏳ Resending OTP...', 'success');
            try {
               const res = await fetch('https://mypodcast-1.onrender.com/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                showMessage('✅ New OTP sent!', 'success');
            } catch {
                showMessage('❌ Cannot connect to server.', 'error');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            document.getElementById('step2').style.display === 'none' ? register() : verifyOTP();
        });
    </script>
</body>
</html>
